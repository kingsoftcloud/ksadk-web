name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "open-source/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build:ksadk
      - run: npm run build:hosted
